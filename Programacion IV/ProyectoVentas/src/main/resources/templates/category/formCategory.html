<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Categoria</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

    <div class="navbar">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/movies/}">Peliculas</a>
        <a th:href="@{/categories/}">Categorias</a>
    </div>

    <div class="contenedor">
        <h1 th:text="${formTitle}">Categoria</h1>
        <br/>
        <form th:action="@{/categories/save}" method="post" th:object="${category}">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Nombre:</label>
                <input type="text" th:field="*{name}" required/>
            </div>

            <div class="form-group">
                <label>Descripcion:</label>
                <input type="text" th:field="*{description}"/>
            </div>

            <br/>
            <button type="submit" class="btn-primary">Guardar</button>
            &nbsp;
            <a th:href="@{/categories/}" class="btn btn-danger">Cancelar</a>
        </form>
    </div>

</body>
</html>
