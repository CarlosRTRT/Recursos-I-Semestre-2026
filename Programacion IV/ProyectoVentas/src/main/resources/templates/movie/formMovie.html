<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Pelicula</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

    <div class="navbar">
        <a th:href="@{/}">Inicio</a>
        <a th:href="@{/movies/}">Peliculas</a>
        <a th:href="@{/categories/}">Categorias</a>
    </div>

    <div class="contenedor">
        <h1 th:text="${formTitle}">Pelicula</h1>
        <br/>
        <form th:action="@{/movies/save}" method="post" th:object="${movie}">
            <input type="hidden" th:field="*{id}"/>

            <div class="form-group">
                <label>Titulo:</label>
                <input type="text" th:field="*{title}" required/>
            </div>

            <div class="form-group">
                <label>Anio de estreno:</label>
                <input type="number" th:field="*{releaseYear}"/>
            </div>

            <div class="form-group">
                <label>URL de foto (opcional):</label>
                <input type="text" th:field="*{photoUrl}"/>
            </div>

            <div class="form-group">
                <label>Categoria:</label>
                <select th:field="*{categoryId}">
                    <option value="">-- Sin categoria --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>

            <br/>
            <button type="submit" class="btn-primary">Guardar</button>
            &nbsp;
            <a th:href="@{/movies/}" class="btn btn-danger">Cancelar</a>
        </form>
    </div>

</body>
</html>
