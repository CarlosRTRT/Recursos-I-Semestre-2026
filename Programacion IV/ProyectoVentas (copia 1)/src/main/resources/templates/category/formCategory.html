<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Categor&iacute;a - CineCat&aacute;logo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">Cine<span>Cat</span></a>
        <ul class="navbar-nav">
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a th:href="@{/movies/}">Pel&iacute;culas</a></li>
            <li><a th:href="@{/categories/}" class="active">Categor&iacute;as</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <div>
                <h1>🏷️ <span th:text="${formTitle}">Categor&iacute;a</span></h1>
                <p class="page-subtitle">Completa los datos de la categor&iacute;a</p>
            </div>
        </div>

        <div class="form-card">
            <form th:action="@{/categories/save}" method="post" th:object="${category}">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label class="form-label">Nombre *</label>
                    <input type="text" class="form-control" th:field="*{name}"
                           placeholder="Ej: Acción, Comedia, Terror..." required/>
                </div>

                <div class="form-group">
                    <label class="form-label">Descripci&oacute;n</label>
                    <input type="text" class="form-control" th:field="*{description}"
                           placeholder="Breve descripci&oacute;n del g&eacute;nero"/>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a th:href="@{/categories/}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
