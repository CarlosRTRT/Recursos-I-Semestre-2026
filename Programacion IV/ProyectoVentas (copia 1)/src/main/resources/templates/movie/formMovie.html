<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Formulario Pel&iacute;cula - CineCat&aacute;logo</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/style.css}"/>
</head>
<body>

    <nav class="navbar">
        <a href="/" class="navbar-brand">Cine<span>Cat</span></a>
        <ul class="navbar-nav">
            <li><a th:href="@{/}">Inicio</a></li>
            <li><a th:href="@{/movies/}" class="active">Pel&iacute;culas</a></li>
            <li><a th:href="@{/categories/}">Categor&iacute;as</a></li>
        </ul>
    </nav>

    <div class="main-container">
        <div class="page-header">
            <div>
                <h1>🎬 <span th:text="${formTitle}">Pel&iacute;cula</span></h1>
                <p class="page-subtitle">Completa los datos de la pel&iacute;cula</p>
            </div>
        </div>

        <div class="form-card">
            <form th:action="@{/movies/save}" method="post" th:object="${movie}">
                <input type="hidden" th:field="*{id}"/>

                <div class="form-group">
                    <label class="form-label">T&iacute;tulo *</label>
                    <input type="text" class="form-control" th:field="*{title}" placeholder="Nombre de la pel&iacute;cula" required/>
                </div>

                <div class="form-group">
                    <label class="form-label">A&ntilde;o de Estreno</label>
                    <input type="number" class="form-control" th:field="*{releaseYear}" placeholder="Ej: 2024" min="1888" max="2099"/>
                </div>

                <div class="form-group">
                    <label class="form-label">URL de Imagen (opcional)</label>
                    <input type="text" class="form-control" th:field="*{photoUrl}" placeholder="https://..."/>
                </div>

                <div class="form-group">
                    <label class="form-label">Categor&iacute;a</label>
                    <select class="form-control" th:field="*{categoryId}">
                        <option value="">-- Sin categor&iacute;a --</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}"
                                th:selected="${movie.categoryId != null and movie.categoryId == cat.id}">
                        </option>
                    </select>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Guardar</button>
                    <a th:href="@{/movies/}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>

</body>
</html>
