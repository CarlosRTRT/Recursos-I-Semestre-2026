spring.application.name=catalogo

server.port=8080

#Para que se actulice las modificaciones solas
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.devtools.restart.enable=true
spring.devtools.livereload.enable=true

spring.datasource.url=jdbc:mysql://localhost:3306/catalogo_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver